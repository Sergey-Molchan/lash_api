version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lashes_postgres
    environment:
      POSTGRES_DB: lashes_db
      POSTGRES_USER: lashes_user
      POSTGRES_PASSWORD: lashes_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lashes_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: