<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Запись в Lash Studio</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:40px 20px}.container{max-width:550px;margin:0 auto;background:white;border-radius:25px;padding:35px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}h1{text-align:center;margin-bottom:10px;color:#333}.back-link{display:inline-block;margin-bottom:20px;color:#667eea;text-decoration:none}.price{text-align:center;font-size:28px;font-weight:bold;color:#4caf50;margin:15px 0}.form-group{margin-bottom:20px}label{display:block;margin-bottom:8px;font-weight:600;color:#555}input,select,textarea{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:inherit}textarea{resize:vertical}button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer}.message{margin-top:20px;padding:12px;border-radius:10px;display:none}.message.success{background:#d4edda;color:#155724;display:block}.message.error{background:#f8d7da;color:#721c24;display:block}.time-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}.time-slot{background:#f0f2ff;padding:12px;text-align:center;border-radius:10px;cursor:pointer;border:2px solid transparent}.time-slot.selected{background:#4caf50;color:white}.time-slot.disabled{background:#e0e0e0;color:#999;cursor:not-allowed;text-decoration:line-through}.info-text{font-size:12px;color:#666;margin-top:5px}
    </style>
</head>
<body>
<div class="container"><a href="/" class="back-link">← На главную</a>
    <h1>✨ Запись в Lash Studio</h1>
    <div id="message" class="message"></div>
    <form id="bookingForm">
        <div class="form-group"><label>👤 Ваше имя</label><input type="text" id="clientName" required></div>
        <div class="form-group"><label>📞 Телефон</label><input type="tel" id="clientPhone" placeholder="+7 (928) 960-19-62" required></div>
        <div class="form-group"><label>💇 Услуга</label><select id="serviceType">
            <option value="lashes">Наращивание ресниц (2.5 часа)</option>
            <option value="brows">Ламинирование бровей (1 час)</option>
            <option value="complex">Комплекс (ресницы+брови) (3 часа)</option>
        </select>
            <div class="info-text">⏱️ Время бронируется с учётом длительности процедуры</div>
        </div>
        <div class="form-group" id="lashesVolumeGroup" style="display:none;">
            <label>💎 Объём ресниц</label>
            <select id="lashesVolume">
                <option value="1d">1D (классика) — 2500 ₽</option>
                <option value="1.5d">1.5D (полуторный) — 2750 ₽</option>
                <option value="2d">2D (полуобъём) — 3000 ₽</option>
                <option value="3d">3D (объём) — 3500 ₽</option>
            </select>
            <div class="info-text">💰 Цена зависит от выбранного объёма</div>
        </div>
        <div class="form-group"><label>📅 Дата</label><input type="date" id="bookingDate" class="calendar-input"></div>
        <div class="form-group"><label>⏰ Время</label>
            <div id="timeSlots" class="time-slots">
                <div class="time-slot disabled">Сначала выберите дату</div>
            </div>
        </div>
        <div class="form-group"><label>💬 Комментарий к записи (необязательно)</label><textarea id="comment" rows="3" placeholder="Например: аллергия, пожелания к мастеру..."></textarea>
        </div>
        <button type="submit">Записаться</button>
    </form>
</div>
<script>
    let selectedTime=null;
    const tomorrow=new Date();
    tomorrow.setDate(tomorrow.getDate()+1);
    document.getElementById('bookingDate').min=tomorrow.toISOString().split('T')[0];

    // Показать/скрыть выбор объёма ресниц
    document.getElementById('serviceType').addEventListener('change', function() {
        const group = document.getElementById('lashesVolumeGroup');
        group.style.display = this.value === 'lashes' ? 'block' : 'none';
    });

    document.getElementById('bookingDate').addEventListener('change',async function(){
        const date=this.value;
        if(!date)return;
        const response=await fetch(`/api/client/available-slots?date=${date}`);
        const data=await response.json();
        const timeSlotsDiv=document.getElementById('timeSlots');
        if(data.is_day_off){
            timeSlotsDiv.innerHTML='<div class="time-slot disabled">❌ В этот день студия не работает</div>';
            selectedTime=null;
            return;
        }
        if(!data.slots||data.slots.length===0){
            timeSlotsDiv.innerHTML='<div class="time-slot disabled">😞 Нет свободного времени</div>';
            selectedTime=null;
            return;
        }
        let html='';
        for(const slot of data.slots){
            html+=`<div class="time-slot" data-time="${slot}" onclick="selectTime('${slot}')">${slot}</div>`;
        }
        timeSlotsDiv.innerHTML=html;
        selectedTime=null;
    });

    function selectTime(time){
        document.querySelectorAll('.time-slot').forEach(el=>el.classList.remove('selected'));
        event.target.classList.add('selected');
        selectedTime=time;
    }

    document.getElementById('bookingForm').addEventListener('submit',async(e)=>{
        e.preventDefault();
        const name=document.getElementById('clientName').value.trim();
        const phone=document.getElementById('clientPhone').value.trim();
        const service=document.getElementById('serviceType').value;
        const lashesVolume = service === 'lashes' ? document.getElementById('lashesVolume').value : null;
        const date=document.getElementById('bookingDate').value;
        const comment=document.getElementById('comment').value;
        if(!name||!phone){showMessage('Заполните имя и телефон','error');return;}
        if(!date){showMessage('Выберите дату','error');return;}
        if(!selectedTime){showMessage('Выберите время','error');return;}
        const bookingDateTime=`${date}T${selectedTime}:00`;
        const response=await fetch('/api/client/book',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                client_name:name,
                client_phone:phone,
                service_type:service,
                lashes_volume:lashesVolume,
                booking_date:bookingDateTime,
                comment:comment
            })
        });
        const result=await response.json();
        if(response.ok){
            showMessage(`✅ Запись создана! Номер: ${result.id}`,'success');
            document.getElementById('bookingForm').reset();
            document.getElementById('timeSlots').innerHTML='<div class="time-slot disabled">Сначала выберите дату</div>';
            document.getElementById('lashesVolumeGroup').style.display='none';
            selectedTime=null;
        }else{
            showMessage(`❌ Ошибка: ${result.detail}`,'error');
        }
    });

    function showMessage(text,type){
        const msg=document.getElementById('message');
        msg.textContent=text;
        msg.className=`message ${type}`;
        setTimeout(()=>{msg.className='message';msg.style.display='none';},5000);
        msg.style.display='block';
    }
</script>
</body>
</html>
