<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Портфолио - Lash Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fb; }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 18px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 24px; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 28px; font-weight: 700; }
        .logo span { color: #e94560; }
        .nav { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav a:hover { color: #e94560; }
        .btn-book { background: #e94560; padding: 10px 28px; border-radius: 40px; }
        .portfolio-section { padding: 140px 0 80px; }
        .section-title {
            text-align: center;
            font-size: 42px;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .gallery-item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .gallery-item img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        .gallery-item p {
            padding: 12px;
            text-align: center;
            font-weight: 500;
            color: #555;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            grid-column: 1/-1;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            background: #1a1a2e;
            color: white;
            padding: 30px 0;
            text-align: center;
        }
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; gap: 15px; }
            .nav { gap: 20px; justify-content: center; }
            .nav a { font-size: 14px; }
            .btn-book { padding: 8px 20px; }
            .portfolio-section { padding: 180px 0 60px; }
            .section-title { font-size: 28px; margin-bottom: 30px; }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            .gallery-item img { height: 180px; }
            .gallery-item p { font-size: 11px; padding: 8px; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="container header-inner">
        <div class="logo">Lash <span>Studio</span></div>
        <div class="nav">
            <a href="/">Главная</a>
            <a href="/portfolio" style="color:#e94560;">Портфолио</a>
            <a href="/booking" class="btn-book">Записаться</a>
        </div>
    </div>
</header>

<section class="portfolio-section">
    <div class="container">
        <h2 class="section-title">Наши работы</h2>
        <div class="gallery-grid" id="galleryGrid">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</section>

<div class="modal" id="imageModal" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <img id="modalImage" src="">
</div>

<footer class="footer">
    <div class="container">
        <p>© 2026 Lash Studio. Все права защищены.</p>
    </div>
</footer>

<script src="/static/js/preload.js"></script>

<script>
    async function loadGallery() {
        const maxRetries = 3;
        let retries = 0;

        async function fetchGallery() {
            try {
                const res = await fetch('/api/gallery', {
                    cache: 'no-cache',
                    headers: { 'Cache-Control': 'no-cache' }
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const images = await res.json();

                if (!images || images.length === 0) {
                    document.getElementById('galleryGrid').innerHTML = '<p style="text-align:center; grid-column:1/-1;">Фотографии скоро появятся</p>';
                    return;
                }

                let html = '';
                for (const img of images) {
                    const imageUrl = img.url || img.image_url;
                    const displayText = img.description || img.title || '';
                    html += `
                        <div class="gallery-item" onclick="openModal('${imageUrl}')">
                            <img src="${imageUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                            <p>${escapeHtml(displayText)}</p>
                        </div>
                    `;
                }
                document.getElementById('galleryGrid').innerHTML = html;
                console.log('✅ Портфолио загружено, фото:', images.length);
            } catch (error) {
                console.error(`Ошибка (попытка ${retries + 1}/${maxRetries}):`, error);
                if (retries < maxRetries - 1) {
                    retries++;
                    setTimeout(fetchGallery, 2000);
                } else {
                    document.getElementById('galleryGrid').innerHTML = '<p style="text-align:center; grid-column:1/-1;">⚠️ Ошибка загрузки фотографий. Пожалуйста, обновите страницу.</p>';
                }
            }
        }

        await fetchGallery();
    }

    function openModal(url) {
        document.getElementById('modalImage').src = url;
        document.getElementById('imageModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('imageModal').style.display = 'none';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Загрузка при открытии страницы
    document.addEventListener('DOMContentLoaded', loadGallery);

    // Повторная загрузка после предзагрузки
    window.addEventListener('apiPreloaded', loadGallery);
</script>
</body>
</html>
