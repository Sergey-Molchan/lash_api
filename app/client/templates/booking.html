<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись в Lash Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 550px; margin: 0 auto; background: white; border-radius: 25px; padding: 35px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; margin-bottom: 10px; color: #333; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #667eea; text-decoration: none; }
        .price { text-align: center; font-size: 28px; font-weight: bold; color: #4caf50; margin: 15px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .message { margin-top: 20px; padding: 12px; border-radius: 10px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .time-slot { background: #f0f2ff; padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .time-slot:hover:not(.disabled) { background: #e0e6ff; transform: scale(0.98); }
        .time-slot.selected { background: #4caf50; color: white; border-color: #4caf50; }
        .time-slot.disabled { background: #e0e0e0; color: #999; cursor: not-allowed; text-decoration: line-through; }
        .calendar-input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #e0e0e0; border-radius: 10px; }
        .warning { color: #ff9800; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← На главную</a>
        <h1>✨ Запись в Lash Studio</h1>
        <div class="price">💰 Предоплата 300 ₽</div>
        <div id="message" class="message"></div>
        <form id="bookingForm">
            <div class="form-group"><label>👤 Ваше имя</label><input type="text" id="clientName" required></div>
            <div class="form-group"><label>📞 Телефон</label><input type="tel" id="clientPhone" placeholder="+7 (928) 458-55-80" required></div>
            <div class="form-group"><label>💇 Услуга</label><select id="serviceType"><option value="lashes">Наращивание ресниц</option><option value="brows">Ламинирование бровей</option><option value="complex">Комплекс (ресницы+брови)</option></select></div>
            <div class="form-group"><label>📅 Дата</label><input type="date" id="bookingDate" class="calendar-input" min=""><div id="dateWarning" class="warning"></div></div>
            <div class="form-group"><label>⏰ Время</label><div id="timeSlots" class="time-slots"><div class="time-slot disabled">Сначала выберите дату</div></div></div>
            <button type="submit">Записаться и оплатить 300₽</button>
        </form>
    </div>
    <script>
        let selectedTime = null;
        let availableSlots = [];
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('bookingDate').min = tomorrow.toISOString().split('T')[0];

        document.getElementById('bookingDate').addEventListener('change', async function() {
            const date = this.value;
            if (!date) return;
            const response = await fetch(`/api/available-slots?date=${date}`);
            const data = await response.json();
            const timeSlotsDiv = document.getElementById('timeSlots');
            if (data.is_day_off) {
                timeSlotsDiv.innerHTML = '<div class="time-slot disabled">❌ В этот день студия не работает</div>';
                selectedTime = null;
                return;
            }
            if (!data.slots || data.slots.length === 0) {
                timeSlotsDiv.innerHTML = '<div class="time-slot disabled">😞 Нет свободного времени</div>';
                selectedTime = null;
                return;
            }
            availableSlots = data.slots;
            let html = '';
            for (const slot of availableSlots) html += `<div class="time-slot" data-time="${slot}" onclick="selectTime('${slot}')">${slot}</div>`;
            timeSlotsDiv.innerHTML = html;
            selectedTime = null;
        });

        function selectTime(time) {
            document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
            selectedTime = time;
        }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('clientName').value.trim();
            const phone = document.getElementById('clientPhone').value.trim();
            const service = document.getElementById('serviceType').value;
            const date = document.getElementById('bookingDate').value;
            if (!name || !phone) { showMessage('Заполните имя и телефон', 'error'); return; }
            if (!date) { showMessage('Выберите дату', 'error'); return; }
            if (!selectedTime) { showMessage('Выберите время', 'error'); return; }
            const bookingDateTime = `${date}T${selectedTime}:00`;
            showMessage('⏳ Создание записи...', 'success');
            const response = await fetch('/api/client/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ client_name: name, client_phone: phone, service_type: service, booking_date: bookingDateTime })
            });
            const result = await response.json();
            if (response.ok) {
                showMessage(`✅ Запись создана! Номер: ${result.id}. Сумма к оплате: 300₽`, 'success');
                document.getElementById('bookingForm').reset();
                document.getElementById('timeSlots').innerHTML = '<div class="time-slot disabled">Сначала выберите дату</div>';
                selectedTime = null;
            } else {
                showMessage(`❌ Ошибка: ${result.detail}`, 'error');
            }
        });

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => { msg.className = 'message'; msg.style.display = 'none'; }, 5000);
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
</html>
